<!DOCTYPE html>
<html>
<head>
  <title>Simi AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      width: 400px;
      margin: auto;
      margin-top: 50px;
      padding: 20px;
      border-radius: 10px;
      background: #1e293b;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .chat {
      margin-top: 20px;
      text-align: left;
      height: 200px;
      overflow-y: auto;
    }

    .msg {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🤖 Simi AI Chatbot</h2>

  <input type="text" id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>

  <div class="chat" id="chat"></div>

  <hr>

  <h3>💌 Confession</h3>
  <input type="text" id="confession" placeholder="Write confession..." />
  <button onclick="sendConfession()">Post</button>

</div>

<script>
const API = "https://your-backend.onrender.com"; // 🔴 REPLACE THIS

async function send() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  addMessage("You: " + msg);

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    addMessage("Simi: " + data.reply);
  } catch (err) {
    addMessage("Error connecting to server ❌");
  }
}

async function sendConfession() {
  const text = document.getElementById("confession").value;
  if (!text) return;

  try {
    await fetch(`${API}/api/confession`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    alert("Confession posted ✅");
  } catch {
    alert("Error ❌");
  }
}

function addMessage(text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;
  chat.appendChild(div);
}
</script>

</body>
</html>
