<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confess to Simi 💌</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page-wrap">
    <header class="top-nav">
      <div class="nav-logo"><a href="/">← Simi</a></div>
    </header>
    <div class="confession-wrap">
      <h2>💌 Secret Confession</h2>
      <p class="sub">Only Simi will see this. Totally anonymous.</p>
      <div class="card">
        <input type="text" id="conf-name" placeholder="Your name (optional)" />
        <textarea id="conf-msg" rows="5" placeholder="tell her something... she won't judge (much)"></textarea>
        <button id="conf-btn" onclick="sendConfession()">Send it 💨</button>
        <div id="conf-status"></div>
      </div>
    </div>
  </div>
  <script>
    async function sendConfession() {
      const msg = document.getElementById('conf-msg').value.trim();
      const name = document.getElementById('conf-name').value.trim();
      if (!msg) { document.getElementById('conf-status').textContent = 'arre kuch likho toh 😭'; return; }
      const btn = document.getElementById('conf-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      const res = await fetch('/api/confessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sender_name: name })
      });
      const data = await res.json();
      document.getElementById('conf-status').textContent = data.message || 'Sent! 💌';
      document.getElementById('conf-msg').value = '';
      btn.textContent = 'Sent 💌';
    }
  </script>
</body>
</html>
